<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- PWA and Mobile Optimization -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    
    <!-- Primary Meta Tags -->
    <title>Shahab Shahrokhi | 3D Interactive Portfolio</title>
    <meta name="title" content="Shahab Shahrokhi | 3D Interactive Portfolio" />
    <meta name="description" content="Explore an immersive 3D interactive portfolio featuring high-fidelity models, arcade games, and custom shaders. Built with Three.js and GSAP." />
    <meta name="keywords" content="Three.js, Portfolio, 3D Web, WebGL, Creative Developer, Interactive Design, Shahab Shahrokhi" />
    <meta name="author" content="Shahab Shahrokhi" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://github.com/shahabshahrokkh/3D-portfolio" />
    <meta property="og:title" content="Shahab Shahrokhi | 3D Interactive Portfolio" />
    <meta property="og:description" content="Immersive 3D workspace and interactive portfolio experience." />
    <meta property="og:image" content="/assets/polaroid_art.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://github.com/shahabshahrokkh/3D-portfolio" />
    <meta property="twitter:title" content="Shahab Shahrokhi | 3D Interactive Portfolio" />
    <meta property="twitter:description" content="Immersive 3D workspace and interactive portfolio experience." />
    <meta property="twitter:image" content="/assets/polaroid_art.png" />

    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Premium UI overlay for loading -->
    <div id="loading-screen">
      <div class="loading-content">
        <h1 class="loading-title">INITIALIZING <span class="highlight">WORKSPACE</span></h1>
        <div class="loading-progress-wrapper">
          <div id="loading-bar"></div>
        </div>
        <div id="loading-text">Loading 3D Assets... 0%</div>
      </div>
    </div>
    <div id="app"></div>
    <div id="action-ui"></div>
    
    <!-- Control Panel UI -->
    <aside id="control-panel">
      <div class="panel-header">CONTROLS</div>
      <ul class="control-list">
        <li><span class="control-key">Left Click</span><span class="control-desc">Drag / Select</span></li>
        <li><span class="control-key">Right Click</span><span class="control-desc">Rotate Camera</span></li>
        <li><span class="control-key">Scroll</span><span class="control-desc">Zoom In/Out</span></li>
      </ul>
      <button id="reset-view-btn">RESET VIEW</button>
    </aside>

    <div id="arcade-hint" style="display:none;">🕹️ Click the screen to play! Press ESC to exit.</div>
    <div id="arcade-overlay" tabindex="-1">
      <div class="arcade-content">
        <div class="arcade-header">
          <h2>ARCADE MODE</h2>
          <button id="close-arcade-btn">EXIT</button>
        </div>
        <div id="arcade-container" tabindex="0"></div>
        <div class="arcade-instructions">Use Arrow Keys or WASD to play. Press ESC to exit.</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
